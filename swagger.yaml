openapi: 3.0.0
info:
  title: API de Autenticación y Configuracion de Bot - InnovaLab Chatbot
  description: >
    Especificación de los endpoints de registro y login. 
    Arquitectura con inicialización de Bot integrada y registro de última sesión, histórico
    de movimientos y autenticación de alta seguridad.
    Configuracion del bot, permitiendo al emprendedor personalizar su experiencia al crear categorias y preguntas frecuentes. 
    Ademas de cargar sus productos para que el bot pueda responder consultas sobre ellos.
    Documentación detallada de cada endpoint, incluyendo validaciones, respuestas esperadas y códigos de error.
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  # ==========================================
  # MÓDULO: AUTENTICACIÓN
  # ==========================================
  /api/auth/register:
    post:
      summary: Registro de un nuevo Emprendedor
      description: >
        Registra un usuario con el rol (EMPRENDEDOR), ejecuta validaciones estrictas de formato antes de crear su fila en ConfiguracionBot mediante una transacción ACID.
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - email
                - password
              properties:
                nombre:
                  type: string
                  minLength: 1
                  example: "Daniela Innova"
                  description: Nombre completo del emprendedor. No puede estar vacío ni contener solo espacios.
                email:
                  type: string
                  format: email
                  pattern: '^[^\s@]+@[^\s@]+\.[^\s@]+$'
                  example: "daniela@innovalab.com"
                  description: Correo electrónico único y con formato válido.
                password:
                  type: string
                  format: password
                  minLength: 8
                  pattern: '^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&.\-_#])[A-Za-z\d@$!%*?&.\-_#]{8,}$'
                  example: "PasswordSegura2026!"
                  description: >
                    Contraseña de acceso. Requisitos obligatorios: Mínimo 8 caracteres de longitud, 
                    debe contener al menos una letra, al menos un número y al menos un carácter especial 
                    permitido (@, $, !, %, *, ?, &, ., -, _, #).
      responses:
        '201':
          description: Usuario y Configuración de Bot creados con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Emprendedor registrado con éxito junto a su configuración de bot"
                  usuarioId:
                    type: string
                    format: uuid
                    example: "4fbc752d-9321-4f11-8e99-fa20d2d88851"
        '400':
          description: Error de validación en los datos enviados o email duplicado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    oneOf:
                      - example: "El nombre es obligatorio y no puede estar vacío"
                      - example: "El formato del correo electrónico no es válido"
                      - example: "La contraseña debe tener al menos 8 caracteres, e incluir letras, números y al menos un carácter especial..."
                      - example: "El email ya está registrado"
        '500':
          description: Error interno.

  /api/auth/login:
    post:
      summary: Inicio de sesión de Emprendedor
      description: Validar credenciales, genera el log en HistorialSesion, guarda última sesión y genera JWT por 24 horas.
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "daniela@innovalab.com"
                  description: Correo electrónico registrado.
                password:
                  type: string
                  format: password
                  example: "PasswordSegura2026!"
                  description: Contraseña de acceso.
      responses:
        '200':
          description: Credenciales válidas. Devuelve token válido por 24h.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  usuario:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "4fbc752d-9321-4f11-8e99-fa20d2d88851"
                      nombre:
                        type: string
                        example: "Daniela Innova"
                      email:
                        type: string
                        example: "daniela@innovalab.com"
        '401':
          description: Credenciales incorrectas o cuenta inactiva.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    oneOf:
                      - example: "Credenciales inválidas"
                      - example: "La cuenta se encuentra inactiva o dada de baja"
        '500':
          description: Error interno del servidor.

  # ==========================================
  # MÓDULO: USUARIO (Requieren Token)
  # ==========================================
  /api/user/change-password:
    post:
      summary: Cambiar contraseña
      description: >
        Permite al emprendedor cambiar su contraseña actual por una nueva. 
        Aplica validaciones estrictas y registra el movimiento en la tabla RegistroActividad.
      tags:
        - Usuario
      security:
        - bearerAuth: [] 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - passwordActual
                - nuevaPassword
              properties:
                passwordActual:
                  type: string
                  example: "PasswordSegura2026!"
                  description: Contraseña de acceso actual.
                nuevaPassword:
                  type: string
                  example: "InnovaLabNueva26@#"
                  description: Nueva contraseña.
      responses:
        '200':
          description: Contraseña actualizada con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Contraseña actualizada con éxito."
        '400':
          description: Error de validación o contraseña actual incorrecta.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    oneOf:
                      - example: "La contraseña actual es incorrecta"
                      - example: "La nueva contraseña debe tener mínimo 8 caracteres, una mayúscula..."
        '401':
          description: Token faltante o expirado.
        '404':
          description: Usuario no encontrado.
        '500':
          description: Error interno del servidor.

  /api/user/delete-account:
    delete:
      summary: Dar de baja la cuenta (Soft Delete)
      description: >
        Ejecuta un falso eliminar. Cambia el estado del usuario a ELIMINADO para restringir su acceso, 
        pero conserva su historial y métricas. Registra la acción en RegistroActividad.
      tags:
        - Usuario
      security:
        - bearerAuth: [] 
      responses:
        '200':
          description: Cuenta dada de baja con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Cuenta deshabilitada correctamente. Se conservan datos para métricas."
        '401':
          description: Acceso denegado. Token faltante, expirado o inválido.
        '500':
          description: Error interno al procesar la baja.
  
  # ==========================================
  # MÓDULO: CATEGORÍAS FAQ
  # ==========================================
  /api/faq-categories:
    get:
      summary: Listar categorías de FAQs
      description: Obtiene todas las categorías asociadas al bot del emprendedor logueado.
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Devuelve un array con todas las categorías del bot.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                    botId:
                      type: string
                      format: uuid
                      example: "09876543-abcd-efgh-ijkl-mnopqrstuvwx"
                    nombre:
                      type: string
                      example: "Medios de Pago"
                    fechaCreacion:
                      type: string
                      format: date-time
                      example: "2026-06-15T15:30:00Z"
        '401':
          description: No autorizado. Token inválido.
        '404':
          description: Configuración de bot no encontrada para el usuario.
        '500':
          description: Error interno al obtener las categorías.
    post:
      summary: Crear categoría
      description: Crea una nueva categoría de FAQs para el bot del emprendedor logueado.
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  minLength: 1
                  example: "Envíos y Retiros"
                  description: Nombre visible de la categoría. No puede estar vacío ni contener solo espacios.
      responses:
        '201':
          description: Categoría creada con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoría creada con éxito."
                  categoria:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                      nombre:
                        type: string
                        example: "Envíos y Retiros"
        '400':
          description: El nombre de la categoría está vacío.
        '404':
          description: Configuración de bot no encontrada para el usuario.
        '500':
          description: Error interno al crear la categoría.

  /api/faq-categories/{id}:
    put:
      summary: Editar categoría
      description: Actualiza los detalles de una categoría de FAQs existente.
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  example: "Logística y Envíos"
      responses:
        '200':
          description: Categoría actualizada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoría actualizada con éxito."
                  categoria:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                      nombre:
                        type: string
                        example: "Envíos y Retiros"
        '400':
          description: El nombre de la categoría está vacío.
        '404':
          description: Categoría no encontrada o no autorizada.
        '500':
          description: Error interno al actualizar la categoría.
    delete:
      summary: Eliminar categoría
      description: Elimina la categoría de forma permanente. Requiere que no existan FAQs asociadas (regla de restricción).
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
      responses:
        '200':
          description: Categoría eliminada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoría eliminada con éxito."
        '400':
          description: Restricción de base de datos activa.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "No podés eliminar esta categoría porque tiene 3 pregunta(s) asociada(s). Eliminá o mové las preguntas primero."
        '404':
          description: Categoría no encontrada.
        '500':
          description: Error interno al eliminar la categoría.

  # ==========================================
  # MÓDULO: PREGUNTAS FRECUENTES (FAQ)
  # ==========================================
  /api/faqs:
    get:
      summary: Listar FAQs
      description: Obtiene todas las preguntas frecuentes del bot, incluyendo el nombre de la categoría a la que pertenecen.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array de FAQs devuelto con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
                    categoriaId:
                      type: string
                      format: uuid
                      example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                    pregunta:
                      type: string
                      example: "¿Hacen envíos a todo el país?"
                    respuesta:
                      type: string
                      example: "Sí, realizamos envíos a través de Correo Argentino."
                    activa:
                      type: boolean
                      example: true
                    categoria:
                      type: object
                      properties:
                        nombre:
                          type: string
                          example: "Envíos y Retiros"
        '400':
          description: Error al obtener las FAQs.
        '401':
          description: No autorizado. Token inválido.
        '404':
          description: No encontrado. Configuración de bot no hallada para este usuario.
        '500': 
          description: Error interno al obtener las FAQs.
    post:
      summary: Crear una nueva FAQ
      description: Asocia una nueva pregunta y respuesta a una categoría existente.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoriaId
                - pregunta
                - respuesta
              properties:
                categoriaId:
                  type: string
                  format: uuid
                  example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                  description: ID de la categoría a la que pertenece.
                pregunta:
                  type: string
                  example: "¿Aceptan transferencias bancarias?"
                respuesta:
                  type: string
                  example: "Sí, aceptamos transferencias. Te enviaremos el CBU al confirmar el pedido."
                activa:
                  type: boolean
                  example: true
                  description: Estado de la FAQ. Por defecto es true.
      responses:
        '201':
          description: Pregunta frecuente creada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Pregunta frecuente creada con éxito."
                  faq:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "c3d4e5f6-g7h8-9012-ijkl-mnopqrstuvwx"
                      pregunta:
                        type: string
                        example: "¿Aceptan transferencias bancarias?"
        '400':
          description: Faltan campos obligatorios en el body.
        '404':
          description: La categoría no existe o no pertenece al bot del usuario.
        '500':
          description: Error interno al crear la FAQ. 

  /api/faqs/{id}:
    put:
      summary: Editar FAQ
      description: Modifica los datos de una pregunta frecuente específica.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoriaId:
                  type: string
                  format: uuid
                  example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                pregunta:
                  type: string
                  example: "¿Tienen cuotas sin interés?"
                respuesta:
                  type: string
                  example: "Ofrecemos 3 cuotas sin interés con tarjetas de crédito bancarias."
                activa:
                  type: boolean
                  example: true
      responses:
        '200':
          description: FAQ actualizada con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Pregunta actualizada con éxito."
                  faq:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
                      pregunta:
                        type: string
                        example: "¿Tienen cuotas sin interés?"
        '400':
          description: La nueva categoría es inválida.
        '404':
          description: Pregunta no encontrada o no autorizada.
        '500':
          description: Error interno al actualizar la FAQ.
    delete:
      summary: Eliminar FAQ
      description: Elimina permanentemente la pregunta frecuente de la base de datos.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
      responses:
        '200':
          description: FAQ eliminada correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Pregunta eliminada con éxito."
        '404':
          description: Pregunta no encontrada.
        '500':
          description: Error interno al eliminar la FAQ.
  # ==========================================
  # MÓDULO: PRODUCTOS (CATÁLOGO)
  # ==========================================
  /api/products:
    get:
      summary: Listar Productos
      description: Obtiene todo el catálogo de productos o servicios asociados al bot del emprendedor logueado.
      tags:
        - Productos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array de productos devuelto con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  productos:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          example: "d1e2f3g4-h5i6-7890-jklm-nopqrstuvwxy"
                        nombre:
                          type: string
                          example: "Remera Sublimada Personalizada"
                        descripcion:
                          type: string
                          example: "Remera de algodón con diseño exclusivo DTF."
                        precio:
                          type: number
                          example: 15000
                        stock:
                          type: number
                          example: 50
                        urlImagen:
                          type: string
                          example: "https://ejemplo.com/remera.jpg"
                        activo:
                          type: boolean
                          example: true
                        fechaCreacion:
                          type: string
                          format: date-time
        '401':
          description: No autorizado. Token inválido o faltante.
        '404':
          description: Configuración de bot no encontrada para el usuario.
        '500':
          description: Error interno al obtener los productos.
    post:
      summary: Crear Producto
      description: Agrega un nuevo producto o servicio al catálogo del emprendedor.
      tags:
        - Productos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - precio
              properties:
                nombre:
                  type: string
                  example: "Remera Sublimada Personalizada"
                  description: Nombre del producto o servicio.
                descripcion:
                  type: string
                  example: "Remera de algodón con diseño exclusivo DTF."
                  description: Descripción detallada (opcional).
                precio:
                  type: number
                  example: 15000
                  description: Precio unitario.
                stock:
                  type: number
                  example: 50
                  description: Cantidad disponible (opcional, por defecto 0).
                urlImagen:
                  type: string
                  example: "https://ejemplo.com/remera.jpg"
                  description: URL de la foto del producto (opcional).
                activo:
                  type: boolean
                  example: true
                  description: Define si el producto está visible en el catálogo (opcional, por defecto true).
      responses:
        '201':
          description: Producto creado con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Producto creado con éxito."
                  producto:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      nombre:
                        type: string
                      precio:
                        type: number
        '400':
          description: Faltan los campos obligatorios (nombre o precio).
        '404':
          description: Configuración de bot no encontrada.
        '500':
          description: Error interno al crear el producto.

  /api/products/{id}:
    put:
      summary: Editar Producto
      description: Actualiza los detalles de un producto existente.
      tags:
        - Productos
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "d1e2f3g4-h5i6-7890-jklm-nopqrstuvwxy"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  example: "Remera Sublimada Premium"
                descripcion:
                  type: string
                  example: "Remera de algodón premium con diseño DTF."
                precio:
                  type: number
                  example: 18000
                stock:
                  type: number
                  example: 45
                urlImagen:
                  type: string
                  example: "https://ejemplo.com/remera-premium.jpg"
                activo:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Producto actualizado con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Producto actualizado con éxito."
                  producto:
                    type: object
        '404':
          description: Producto no encontrado o no pertenece al catálogo del usuario.
        '500':
          description: Error interno al actualizar el producto.
    delete:
      summary: Eliminar Producto
      description: Elimina permanentemente un producto del catálogo del bot.
      tags:
        - Productos
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "d1e2f3g4-h5i6-7890-jklm-nopqrstuvwxy"
      responses:
        '200':
          description: Producto eliminado con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Producto eliminado con éxito."
        '404':
          description: Producto no encontrado o ya eliminado.
        '500':
          description: Error interno al eliminar el producto.
  # ==========================================
  # MÓDULO: CONFIGURACIÓN DEL BOT
  # ==========================================
  /api/bot:
    get:
      summary: Obtener la configuración del bot
      description: Devuelve la configuración actual del bot asociado al emprendedor logueado.
      tags:
        - Configuración Bot
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuración obtenida con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  configuracion:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "d4e5f6g7-h8i9-012j-klmn-opqrstuvwxyz"
                      usuarioId:
                        type: string
                        format: uuid
                        example: "4fbc752d-9321-4f11-8e99-fa20d2d88851"
                      activo:
                        type: boolean
                        example: true
                        description: Indica si el bot está encendido respondiendo mensajes.
                      nombreNegocio:
                        type: string
                        example: "InnovaLab Store"
                        nullable: true
                      logoUrl:
                        type: string
                        example: "https://midominio.com/logo.png"
                        nullable: true
                      mensajeBienvenida:
                        type: string
                        example: "¡Hola! Bienvenido a InnovaLab Store. ¿En qué te puedo ayudar hoy?"
                        nullable: true
                      mensajeFueraHorario:
                        type: string
                        example: "En este momento estamos cerrados. Por favor, dejanos tu consulta y te responderemos a la brevedad."
                        nullable: true
                      derivacionAutomatica:
                        type: boolean
                        example: false
                        description: Si es true, el bot transfiere la charla a un humano ante consultas complejas.
        '401':
          description: No autorizado. Token faltante, expirado o inválido.
        '404':
          description: Configuración de bot no encontrada para este usuario.
        '500':
          description: Error interno del servidor al obtener la configuración.

    put:
      summary: Actualizar la configuración del bot
      description: >
        Permite al emprendedor modificar parámetros de su bot. 
        Solo se actualizarán los campos que sean enviados en el cuerpo de la petición.
      tags:
        - Configuración Bot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                activo:
                  type: boolean
                  example: true
                nombreNegocio:
                  type: string
                  example: "InnovaLab Store 2.0"
                logoUrl:
                  type: string
                  example: "https://midominio.com/nuevo-logo.png"
                mensajeBienvenida:
                  type: string
                  example: "¡Hola! Gracias por comunicarte con nosotros. ¿Qué estás buscando?"
                mensajeFueraHorario:
                  type: string
                  example: "Nuestro horario de atención es de 9 a 18hs. Dejanos tu mensaje."
                derivacionAutomatica:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Configuración actualizada correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Configuración del bot actualizada con éxito."
                  configuracion:
                    type: object
                    description: Objeto con la configuración ya actualizada en la base de datos.
        '401':
          description: No autorizado. Token faltante, expirado o inválido.
        '404':
          description: Configuración de bot no encontrada para este usuario.
        '500':
          description: Error interno del servidor al actualizar la configuración.